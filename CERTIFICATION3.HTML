<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viresh Kumar - Certifications Archive</title>

    <script>
        (function () {
            const stored = localStorage.getItem('vk-theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme = stored || (prefersDark ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..500&family=JetBrains+Mono:wght@300;400;500&family=Inter:wght@300;400;500&display=swap">

    <style>
        :root,
        :root[data-theme="light"] {
            --bg: #ECE4D3;
            --bg-deep: #E5DCC7;
            --paper: #F5EEDD;
            --paper-shadow: #C7BC9F;
            --ink: #1A1614;
            --ink-soft: rgba(26, 22, 20, 0.72);
            --ink-mute: rgba(26, 22, 20, 0.5);
            --ink-faint: rgba(26, 22, 20, 0.3);
            --crimson: #8B1E1E;
            --crimson-soft: rgba(139, 30, 30, 0.08);
            --rule: rgba(26, 22, 20, 0.18);
            --rule-strong: rgba(26, 22, 20, 0.4);
            --nav-bg: rgba(236, 228, 211, 0.92);
        }

        :root[data-theme="dark"] {
            --bg: #14110F;
            --bg-deep: #100E0C;
            --paper: #1E1A17;
            --paper-shadow: #050403;
            --ink: #E8DFCB;
            --ink-soft: rgba(232, 223, 203, 0.74);
            --ink-mute: rgba(232, 223, 203, 0.5);
            --ink-faint: rgba(232, 223, 203, 0.25);
            --crimson: #C44545;
            --crimson-soft: rgba(196, 69, 69, 0.12);
            --rule: rgba(232, 223, 203, 0.16);
            --rule-strong: rgba(232, 223, 203, 0.36);
            --nav-bg: rgba(20, 17, 15, 0.88);
        }

        :root {
            --ease-quiet: cubic-bezier(.22, 1, .36, 1);
            --ease-emphasis: cubic-bezier(.16, 1, .3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            background: var(--bg);
            color: var(--ink);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            line-height: 1.65;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
            transition: background 600ms var(--ease-quiet), color 600ms var(--ease-quiet);
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 10%, rgba(139, 30, 30, 0.05), transparent 50%),
                radial-gradient(ellipse at 90% 80%, rgba(139, 126, 92, 0.06), transparent 50%);
            pointer-events: none;
            z-index: 1;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(26, 22, 20, 0.012) 2px, rgba(26, 22, 20, 0.012) 3px);
            pointer-events: none;
            z-index: 1;
        }

        :root[data-theme="dark"] body::after {
            background-image:
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255, 255, 255, 0.015) 2px, rgba(255, 255, 255, 0.015) 3px);
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        img {
            max-width: 100%;
            display: block;
        }

        .wrap {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 2rem;
            position: relative;
            z-index: 2;
        }

        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 120;
            padding: 1.25rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--nav-bg);
            border-bottom: 1px solid var(--rule);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .nav__brand {
            font-family: 'Fraunces', serif;
            font-size: 1.1rem;
            display: flex;
            gap: 0.5rem;
            align-items: baseline;
        }

        .nav__brand-mark {
            color: var(--crimson);
            font-style: italic;
        }

        .nav__links {
            list-style: none;
            display: flex;
            gap: 2rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--ink-soft);
        }

        .nav__links a {
            transition: color 300ms var(--ease-quiet);
        }

        .nav__links a:hover {
            color: var(--crimson);
        }

        .nav__meta {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.68rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--ink-mute);
        }

        .theme-toggle {
            position: fixed;
            bottom: 1.75rem;
            right: 1.75rem;
            z-index: 200;
            padding: 0.58rem 0.85rem;
            background: var(--paper);
            border: 1px solid var(--rule-strong);
            border-radius: 999px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.64rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--ink-soft);
            cursor: pointer;
            transition: all 350ms var(--ease-quiet);
        }

        .theme-toggle:hover {
            color: var(--crimson);
            border-color: var(--crimson);
            transform: translateY(-2px);
        }

        .back-home-btn {
            position: fixed;
            top: 1.25rem;
            left: 1.4rem;
            z-index: 210;
            display: inline-flex;
            align-items: center;
            gap: 0.55rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.64rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--ink-soft);
            border: 1px solid var(--rule-strong);
            background: var(--paper);
            padding: 0.55rem 0.85rem;
            border-radius: 999px;
            transition: color 320ms var(--ease-quiet), border-color 320ms var(--ease-quiet), transform 320ms var(--ease-quiet);
        }

        .back-home-btn:hover {
            color: var(--crimson);
            border-color: var(--crimson);
            transform: translateY(-2px);
        }

        main {
            padding: 8rem 0 5rem;
            position: relative;
            z-index: 2;
        }

        .section-head {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 2rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }

        .section-head__num {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 0.24em;
            text-transform: uppercase;
            color: var(--ink-mute);
            display: block;
            margin-bottom: 1rem;
        }

        .section-head__num span {
            color: var(--crimson);
        }

        .section-head h1 {
            font-family: 'Fraunces', serif;
            font-weight: 400;
            letter-spacing: -0.02em;
            font-size: clamp(2rem, 5vw, 4.4rem);
            line-height: 1;
            max-width: 14ch;
        }

        .section-head__right {
            max-width: 32ch;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--ink-mute);
            line-height: 1.7;
        }

        .cert-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.8rem;
        }

        .cert-card {
            position: relative;
            background: var(--paper);
            border: 1px solid var(--rule);
            box-shadow: 0 1px 0 var(--paper-shadow), 0 18px 30px -18px rgba(26, 22, 20, 0.28);
            transition: transform 420ms var(--ease-emphasis), box-shadow 420ms var(--ease-emphasis), border-color 420ms var(--ease-emphasis);
            overflow: hidden;
        }

        .cert-card:hover {
            transform: translateY(-4px);
            border-color: var(--crimson);
            box-shadow: 0 1px 0 var(--paper-shadow), 0 24px 40px -18px rgba(26, 22, 20, 0.34);
        }

        .cert-card img {
            width: 100%;
            aspect-ratio: 16 / 11;
            object-fit: cover;
            transition: filter 420ms var(--ease-emphasis);
        }

        .cert-card:hover img {
            filter: brightness(0.45);
        }

        .cert-meta {
            position: absolute;
            top: 0.85rem;
            left: 0.9rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.62rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--bg);
            background: rgba(26, 22, 20, 0.58);
            padding: 0.35rem 0.55rem;
            border: 1px solid rgba(255, 255, 255, 0.35);
        }

        .view-btn-container {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 380ms var(--ease-quiet);
            background: rgba(0, 0, 0, 0.45);
        }

        .cert-card:hover .view-btn-container {
            opacity: 1;
        }

        .view-btn {
            border: 1px solid rgba(255, 255, 255, 0.8);
            background: transparent;
            color: #fff;
            padding: 0.9rem 1.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.66rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 280ms var(--ease-quiet);
        }

        .view-btn:hover {
            background: var(--crimson);
            border-color: var(--crimson);
            transform: translateY(-1px);
        }

        .archive-note {
            margin-top: 2.5rem;
            padding-top: 1.5rem;
            border-top: 1px dashed var(--rule-strong);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.68rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--ink-mute);
            line-height: 1.7;
            text-align: center;
        }

        .archive-note a {
            color: var(--crimson);
            border-bottom: 1px solid var(--crimson);
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(10, 8, 7, 0.95);
            padding: 2rem;
            cursor: zoom-out;
        }

        .modal.open {
            display: grid;
            place-items: center;
        }

        .modal-content {
            width: min(92vw, 1200px);
            max-height: 88vh;
            object-fit: contain;
            border: 1px solid rgba(255, 255, 255, 0.24);
            box-shadow: 0 30px 60px -24px rgba(0, 0, 0, 0.6);
        }

        .close-modal {
            position: fixed;
            top: 1.2rem;
            right: 1.4rem;
            color: rgba(255, 255, 255, 0.9);
            font-size: 2rem;
            font-family: 'Fraunces', serif;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.35);
            width: 42px;
            height: 42px;
            display: grid;
            place-items: center;
            line-height: 1;
            background: rgba(255, 255, 255, 0.04);
        }

        .close-modal:hover {
            background: rgba(255, 255, 255, 0.14);
        }

        @media (max-width: 900px) {
            .nav__links {
                display: none;
            }

            .nav__meta {
                display: none;
            }

            .cert-grid {
                grid-template-columns: 1fr;
            }

            .wrap {
                padding: 0 1.25rem;
            }

            main {
                padding-top: 7rem;
            }

            .theme-toggle {
                bottom: 1rem;
                right: 1rem;
            }

            .back-home-btn {
                top: 1rem;
                left: 1rem;
            }
        }
    </style>
</head>

<body>
    <a class="back-home-btn" href="index.html" aria-label="Back to home">
        <span>←</span>
        <span>Back to Home</span>
    </a>

    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">Dim</button>

    <nav class="nav">
        <div class="nav__brand">

        </div>
        <ul class="nav__links">

            <li><a href="index3.html#contact">Contact</a></li>

        <div class="nav__meta">Exhibit Ledger - 2026</div>

    <main>

                </article>

                <article class="cert-card">

    <div id="imageModal" class="modal" aria-hidden="true">
        <button class="close-modal" id="close-modal" type="button" aria-label="Close">x</button>
        <img class="modal-content" id="modalImage" alt="Certification preview">
    </div>

    <script>
        const toggle = document.getElementById('theme-toggle');
        const root = document.documentElement;

        function updateToggleLabel() {
            toggle.textContent = root.getAttribute('data-theme') === 'dark' ? 'Illuminate' : 'Dim';
        }

        updateToggleLabel();

        toggle.addEventListener('click', () => {
            const current = root.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            root.setAttribute('data-theme', next);
            localStorage.setItem('vk-theme', next);
            updateToggleLabel();
        });

        const modal = document.getElementById('imageModal');
        const modalImage = document.getElementById('modalImage');
        const closeModalBtn = document.getElementById('close-modal');
        const viewButtons = document.querySelectorAll('.view-btn');

        function openModal(imageSrc) {
            modalImage.src = imageSrc;
            modal.classList.add('open');
            modal.setAttribute('aria-hidden', 'false');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.classList.remove('open');
            modal.setAttribute('aria-hidden', 'true');
            document.body.style.overflow = '';
        }

        viewButtons.forEach((button) => {
            button.addEventListener('click', () => openModal(button.dataset.image));
        });

        closeModalBtn.addEventListener('click', closeModal);

        modal.addEventListener('click', (event) => {
            if (event.target === modal) {
                closeModal();
            }
        });

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape' && modal.classList.contains('open')) {
                closeModal();
            }
        });
    </script>
</body>

</html>
